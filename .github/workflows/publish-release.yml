name: Publish V1.0 Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g. v1.0)'
        required: true
        default: 'v1.0'

jobs:
  build-and-release:
    name: "Build and Publish Release"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate gradle wrapper
        uses: gradle/wrapper-validation-action@v1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Setup gradle
        uses: gradle/gradle-build-action@v2

      - name: Setup gradlew
        working-directory: source
        run: chmod +x gradlew

      - name: Decode store file
        working-directory: source
        env:
            STORE_FILE: ${{ secrets.STORE_FILE }}
            ENCODED_STRING: ${{ secrets.STORE_BASE64 }}
        run: |
          if [ ! -z "$ENCODED_STRING" ]; then
            echo $ENCODED_STRING | base64 -di > "./app/${STORE_FILE}"
          else
            echo "Skipping keystore setup (missing secrets)"
          fi

      - name: Build with gradle
        working-directory: source
        env:
          STORE_FILE: ${{ secrets.STORE_FILE }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          # Maximize RAM (4GB to Gradle) and enable global caching for standard 7GB GitHub runners
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:+UseG1GC -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"
        run: ./gradlew assembleArm64-v8aPremiumRelease assembleArmeabi-v7aPremiumRelease assembleX86PremiumRelease assembleX86_64PremiumRelease --no-daemon --parallel --build-cache

      - name: Publish Release to GitHub
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "🚀 Jigar Backup ${{ github.event.inputs.version }}"
          body_path: release_notes.md
          files: source/app/build/outputs/apk/*/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
